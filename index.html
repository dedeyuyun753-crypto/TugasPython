<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<title>Website Uyun 🌸</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to bottom, #ffb6c1, #ffe4e1);
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.box{
    background: rgba(255,255,255,0.2);
    padding:40px;
    border-radius:25px;
    backdrop-filter: blur(8px);
}
@keyframes fadeIn{
    from{
        opacity: 0;
        transform: translateY(20px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

.card{
    animation: fadeIn 1s ease;
}
h1{
    font-size:40px;
}

p{
    font-size:18px;
}

</style>

</head>

<body>

<div class="box">
<h1>🌸 Uyun Website</h1>
<p>Selamat datang di website ku 💕</p>
</div>

</body>
</html>
